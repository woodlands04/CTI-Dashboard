name: Update CTI Dashboard

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch latest threat intelligence
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-intel.js

      - name: Update dashboard HTML
        run: node scripts/update-dashboard.js

      - name: Commit and push changes
        run: |
          git config user.name "CTI-Bot"
          git config user.email "cti-bot@users.noreply.github.com"
          git add -A
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git diff --staged --quiet || git commit -m "CTI Dashboard Update: ${TIMESTAMP}"
          git push

  deploy:
    needs: update-dashboard
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
